priority: 10
name: "simple-injection-test"
tags: ["example", "basic"]
skip: false
timeout_ms: 5000

when:
  inject:
    - message_id: "order1"
      topic: "users.commands"
      headers:
        my-test-header: "HeaderValue123"
      key: "myMessageKey"
      payload: |
        {
          "orderId": "{{testId}}-{{uuid}}",
          "sourceId": "{{uuid}}",
          "username": "ABC",
          "action": "REGISTER",
          "source": "SomeSource",
          "email": "aaa@ing.com",
          "customerId": "CUST-123",
          "amount": 99.99,
          "status": "NEW"
        }

then:
  expectations:
    - topic: "users.events"
      wait_ms: 2000
      correlate:
        message_id: "order1"
      match:
        - type: key
          value: "myMessageKey"
        - type: header
          expression: "my-header"
          value: "MyCustomHeader"
        - type: jsonpath
          expression: "$.source"
          value: "SomeSource"
        - type: jsonpath
          expression: "$.status"
          regex: "PROCESSED|ACCEPTED"







