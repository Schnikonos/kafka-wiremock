  expectations:
    - topic: "users.events"
      message_id: "order1"
      source_id: "$.sourceId"
      target_id: "$.targetId"
      wait_ms: 2000
      match:
        - type: jsonpath
          expression: "$.status"
          regex: "PROCESSED|ACCEPTED"

