priority: 10
name: "simple-injection-test"
tags: ["example", "basic"]
skip: false
timeout_ms: 5000

when:
  inject:
    - message_id: "order1"
      topic: "users.commands"
      payload: |
        {
          "action": "REGISTER", 
          "sourceId": "{{uuid}}", 
          "username": "ABC", 
          "email": "aaa@ing.com", 
          "source": "SomeSource"
        }

