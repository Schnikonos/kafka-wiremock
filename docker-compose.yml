version: '3.9'
# Note: This docker-compose file provides ONLY the kafka-wiremock service.
# You must provide your own Kafka broker and set the KAFKA_BOOTSTRAP_SERVERS environment variable.
# 
# Example: docker-compose up -e KAFKA_BOOTSTRAP_SERVERS=kafka:9092
services:
  kafka-wiremock:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Set your Kafka bootstrap servers (comma-separated for multiple brokers)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
      CONFIG_DIR: /config
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      # Mount the config directory (you can customize config files here)
      - ./config:/config:ro
      # Optional: mount logs
      - ./logs:/var/log/wiremock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped
