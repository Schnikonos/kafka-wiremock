# Example 1: Exact match with simple template
# This rule matches messages on the "orders" topic
# and produces a response on the "shipments" topic

priority: 10
name: "order-to-shipment"

when:
  topic: orders
  match:
    - type: exact
      value: "order-created"

then:
  - topic: shipments
    payload: |
      {
        "status": "shipment_ready",
        "created_at": "{{now}}",
        "shipmentId": "{{uuid}}"
      }

