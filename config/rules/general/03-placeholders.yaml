# Example: Complex placeholders and random data generation
priority: 5

when:
  topic: users.commands
  match:
    - type: jsonpath
      expression: "$.action"
      value: "REGISTER"

then:
  - topic: users.events
    payload: |
      {
        "userId": "{{uuid}}",
        "targetId": "{{$.sourceId}}",
        "username": "{{$.username}}",
        "email": "{{$.email}}",
        "status": "PROCESSED",
        "registeredAt": "{{now}}",
        "verificationCodeExpiry": "{{now+24h}}",
        "temporaryToken": "token_{{randomInt(100000,999999)}}",
        "source": "{{$.source}}"
      }
