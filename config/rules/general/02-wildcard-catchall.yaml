# Example: Catch-all rule (wildcard) - matches any message on a topic
# Useful as a fallback when no other rules match
priority: 999

when:
  topic: orders.dlq
  # No match block = matches any message on this topic (wildcard)

then:
  - topic: orders.dlq.archived
    payload: |
      {
        "originalMessage": "{{message}}",
        "archivedAt": "{{now}}",
        "archiveId": "{{uuid}}"
      }

